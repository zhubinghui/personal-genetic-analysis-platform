networks:
  genetic_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  minio_data:
  fastembed_cache:  # 本地嵌入模型缓存（首次启动时自动下载，约 33 MB）

services:
  # ── PostgreSQL + pgvector ────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - genetic_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    networks:
      - genetic_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO 对象存储 ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - genetic_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # MinIO 初始化（创建 bucket）
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: /scripts/setup.sh
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_IDAT: ${MINIO_BUCKET_IDAT}
      MINIO_BUCKET_REPORTS: ${MINIO_BUCKET_REPORTS}
      MINIO_BUCKET_KNOWLEDGE: ${MINIO_BUCKET_KNOWLEDGE}
    volumes:
      - ./infrastructure/minio/setup.sh:/scripts/setup.sh:ro
    networks:
      - genetic_net

  # ── FastAPI 后端 ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      FASTEMBED_CACHE_PATH: /app/.cache/fastembed
    volumes:
      - fastembed_cache:/app/.cache/fastembed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - genetic_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Celery 分析 Worker ──────────────────────────────────────
  worker:
    build:
      context: ./analysis
      dockerfile: Dockerfile
    command: celery -A worker.celery_app worker --loglevel=info -Q analysis --concurrency=1
    env_file: .env
    volumes:
      - ./backend/app:/app/app:ro
      - ./analysis/r_scripts:/app/r_scripts:ro
      - ./analysis/pipeline:/app/pipeline:ro
      - ./analysis/worker:/app/worker:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - genetic_net

  # ── Next.js 前端 ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - backend
    networks:
      - genetic_net

  # ── Nginx 反向代理 ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - genetic_net
