name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── 后端 Lint ────────────────────────────────────────────
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install ruff mypy
      - name: Ruff check
        run: ruff check app/
      - name: Mypy
        run: mypy app/ --ignore-missing-imports

  # ── 后端测试 ──────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: test_genetic_platform
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_genetic_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql+asyncpg://test_user:test_password@localhost:5432/test_genetic_platform"
      DATABASE_URL_SYNC: "postgresql://test_user:test_password@localhost:5432/test_genetic_platform"
      TEST_DATABASE_URL: "postgresql+asyncpg://test_user:test_password@localhost:5432/test_genetic_platform"
      REDIS_URL: "redis://localhost:6379/0"
      JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
      FILE_ENCRYPTION_KEY: "dGVzdGtleTEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNA=="
      MINIO_ENDPOINT: "localhost:9000"
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
      ENVIRONMENT: "test"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Enable pgvector extension
        run: |
          PGPASSWORD=test_password psql -h localhost -U test_user -d test_genetic_platform \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run database migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest tests/ -v --tb=short -x

  # ── 分析引擎测试 ────────────────────────────────────────────
  test-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analysis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install pytest pytest-asyncio structlog cryptography minio
      - name: Run analysis tests
        run: python -m pytest tests/ -v --tb=short -x

  # ── 前端检查 ──────────────────────────────────────────────
  check-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type check
        run: npm run type-check
      - name: ESLint
        run: npm run lint

  # ── Docker 构建验证 ───────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, test-analysis, check-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t genetic-platform-backend ./backend
      - name: Build frontend image
        run: docker build -t genetic-platform-frontend ./frontend
      - name: Verify backend health endpoint
        run: |
          docker run -d --name backend-test \
            -e DATABASE_URL="sqlite+aiosqlite:///test.db" \
            -e JWT_SECRET_KEY="test" \
            -e ENVIRONMENT="test" \
            -p 8000:8000 \
            genetic-platform-backend || true
          sleep 5
          docker logs backend-test 2>&1 | tail -20
