worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # 上传大小限制（IDAT 文件可达 200MB）
    client_max_body_size 512m;

    # 安全响应头
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "DENY"            always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin"   always;

    # ── 限流区域定义 ──────────────────────────────────────────
    # 全局 API 限流：每 IP 每秒 30 请求
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
    # 认证接口限流：每 IP 每分钟 5 请求
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # 文件上传限流：每 IP 每分钟 2 请求
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/m;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # ── 429 自定义 JSON 响应 ──────────────────────────────
        error_page 429 = @rate_limit_error;
        location @rate_limit_error {
            default_type application/json;
            return 429 '{"detail": "请求过于频繁，请稍后再试"}';
        }

        # ── 认证接口（严格限流）────────────────────────────────
        location ~ ^/api/v1/auth/(login|register|send-code|verify-code|forgot-password|reset-password) {
            limit_req zone=auth burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ── 文件上传（限流）────────────────────────────────────
        location ~ ^/api/v1/samples/upload/ {
            limit_req zone=upload burst=1 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ── 通用 API（全局限流）────────────────────────────────
        location /api/ {
            limit_req zone=global burst=50 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # 健康检查（不限流）
        location /health {
            proxy_pass http://backend/health;
        }

        # 前端
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
